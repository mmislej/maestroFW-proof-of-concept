name: Maestro Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Flutter samples (app under test)
        run: git clone --depth 1 https://github.com/flutter/samples.git

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: samples/provider_shopper
        run: flutter pub get

      - name: Start iOS Simulator
        run: |
          xcrun simctl boot "iPhone 16 Pro" || true
          open -a Simulator

      - name: Build & install app on simulator
        working-directory: samples/provider_shopper
        run: flutter build ios --simulator --no-codesign

      - name: Install app on simulator
        working-directory: samples/provider_shopper
        run: |
          DEVICE_ID=$(xcrun simctl list devices booted | grep -oE '[A-F0-9-]{36}' | head -1)
          xcrun simctl install $DEVICE_ID build/ios/iphonesimulator/Runner.app

      - name: Install Maestro
        run: curl -fsSL "https://get.maestro.mobile.dev" | bash

      - name: Run Maestro tests
        run: |
          export PATH="$PATH":"$HOME/.maestro/bin"
          maestro test tests/add_to_cart.yaml

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug-ios
          path: ~/.maestro/tests/

  test-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Flutter samples (app under test)
        run: git clone --depth 1 https://github.com/flutter/samples.git

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.4
          channel: stable

      - name: Install dependencies
        working-directory: samples/provider_shopper
        run: flutter pub get

      - name: Build Android APK
        working-directory: samples/provider_shopper
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Run Android Emulator and Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          script: |
            adb install samples/provider_shopper/build/app/outputs/flutter-apk/app-debug.apk
            curl -fsSL "https://get.maestro.mobile.dev" | bash
            export PATH="$PATH":"$HOME/.maestro/bin"
            maestro test tests/add_to_cart.yaml

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug-android
          path: ~/.maestro/tests/
