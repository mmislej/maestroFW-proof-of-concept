name: Maestro Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Flutter samples (app under test)
        run: git clone --depth 1 https://github.com/flutter/samples.git

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: samples/provider_shopper
        run: flutter pub get

      - name: Start iOS Simulator
        run: |
          xcrun simctl boot "iPhone 16 Pro" || true
          open -a Simulator

      - name: Build & install app on simulator
        working-directory: samples/provider_shopper
        run: flutter build ios --simulator --no-codesign

      - name: Install app on simulator
        working-directory: samples/provider_shopper
        run: |
          DEVICE_ID=$(xcrun simctl list devices booted | grep -oE '[A-F0-9-]{36}' | head -1)
          xcrun simctl install $DEVICE_ID build/ios/iphonesimulator/Runner.app

      - name: Install Maestro
        run: curl -fsSL "https://get.maestro.mobile.dev" | bash

      - name: Run Maestro tests
        if: always()
        run: |
          export PATH="$PATH":"$HOME/.maestro/bin"
          mkdir -p test-results
          maestro test tests/ --format junit --output test-results/report.xml || true

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ios
          path: test-results/

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug-ios
          path: ~/.maestro/tests/

  publish-report:
    runs-on: ubuntu-latest
    needs: [test-ios]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download iOS test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-ios
          path: test-results/

      - name: Setup Java (for Allure)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Allure
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        run: allure generate test-results --clean -o allure-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
